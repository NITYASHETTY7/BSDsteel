services:
  # FastAPI Backend
  - type: web
    name: bsdsteel-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bsdsteel-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480

databases:
  # PostgreSQL Database
  - name: bsdsteel-db
    plan: free
    databaseName: bsdsteel
